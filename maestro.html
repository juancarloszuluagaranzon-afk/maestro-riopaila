<!doctype html>
<html lang="es" class="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Maestro de Suertes - Riopaila Agrícola">
  <link rel="manifest" href="manifest.json">
  <title>Riopaila Agrícola – Maestro</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    :root {
      --font-manrope: 'Manrope', sans-serif;

      /* Dark Theme (Default) */
      --bg-body: #020617;
      /* slate-950 */
      --text-main: #f1f5f9;
      /* slate-100 */
      --text-muted: #94a3b8;
      /* slate-400 */
      /* Liquid Glass Dark */
      --glass-bg: rgba(15, 23, 42, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      /* Finer border */
      --glass-shadow: rgba(0, 0, 0, 0.2);
      --glass-inner-shadow: rgba(255, 255, 255, 0.03);
      --header-bg: rgba(15, 23, 42, 0.85);
      --input-bg: rgba(15, 23, 42, 0.5);
      --input-text: #ffffff;
      --table-header-bg: rgba(15, 23, 42, 0.95);
      --table-header-text: #2dd4bf;
      /* teal-400 */

      --row-hover: rgba(255, 255, 255, 0.04);
      --modal-bg: rgba(15, 23, 42, 0.85);

      --success-bg: rgba(16, 185, 129, 0.1);
      /* emerald-500/10 */
      --success-text: #34d399;
      /* emerald-400 */

      /* Sticky first column (dark) - must be opaque to block scrolling content behind */
      --sticky-header-bg: #0f172a;
      --sticky-body-bg: #0b1220;
      --sticky-body-hover-bg: #162032;

      --aurora-opacity: 0.6;
      --aurora-blend: screen;
    }

    /* Light Theme Override */
    /* Light theme: clean "paper" look — solid white surfaces, no aurora,
       no backdrop blur (the blur does nothing over a uniform background
       and only costs paint). Subtle borders + soft shadows give depth. */
    :root.light {
      --bg-body: #fafbfc;
      --text-main: #0f172a;
      --text-muted: #64748b;

      /* Solid panels (no glass effect — uniform light bg makes blur useless) */
      --glass-bg: #ffffff;
      --glass-border: rgba(15, 23, 42, 0.08);
      --glass-shadow: rgba(15, 23, 42, 0.06);
      --glass-inner-shadow: transparent;

      --header-bg: rgba(255, 255, 255, 0.92);
      --input-bg: #ffffff;
      --input-text: #0f172a;

      --table-header-bg: #f8fafc;
      --table-header-text: #0d9488;

      --row-hover: rgba(15, 23, 42, 0.035);
      --modal-bg: #ffffff;

      --success-bg: rgba(16, 185, 129, 0.1);
      --success-text: #059669;

      /* Sticky identifier column (light) */
      --sticky-header-bg: #f1f5f9;
      --sticky-body-bg: #ffffff;
      --sticky-body-hover-bg: #f1f5f9;

      /* Aurora is fully off in light mode */
      --aurora-opacity: 0;
      --aurora-blend: normal;
    }

    /* Stop animating + remove the blur cost in light mode */
    :root.light .blob {
      display: none;
    }
    :root.light .glass-panel,
    :root.light .glass-header,
    :root.light .glass-input,
    :root.light .filter-multi-popover,
    :root.light #filterDrawer,
    :root.light #bottomNav {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    /* Slightly more lift on cards so they read as "above" the page */
    :root.light .glass-panel {
      box-shadow:
        0 1px 2px rgba(15, 23, 42, 0.04),
        0 4px 12px rgba(15, 23, 42, 0.05);
    }

    /* Hide the dark-tint overlay from the dynamic background wrapper */
    :root.light .bg-slate-950\/20 {
      display: none !important;
    }

    /* Replace the heavy shadow-2xl on the table container */
    :root.light #tableContainer {
      box-shadow:
        0 1px 2px rgba(15, 23, 42, 0.05),
        0 8px 24px rgba(15, 23, 42, 0.06) !important;
    }

    /* Modal panel: soft elevation instead of shadow-2xl */
    :root.light #detailModal .shadow-2xl {
      box-shadow:
        0 2px 6px rgba(15, 23, 42, 0.06),
        0 18px 48px rgba(15, 23, 42, 0.12) !important;
    }

    /* Filter trigger pill on the side */
    :root.light #filterTrigger {
      box-shadow: -3px 2px 14px rgba(15, 23, 42, 0.08);
    }

    body {
      font-family: var(--font-manrope);
      background-color: var(--bg-body);
      color: var(--text-main);
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* --- Aurora Background Animation (Shared) --- */
    .blob {
      position: absolute;
      filter: blur(80px);
      z-index: -1;
      opacity: var(--aurora-opacity);
      mix-blend-mode: var(--aurora-blend);
      transition: opacity 0.5s;
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      animation: fluidMove 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fluidMove {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      50% {
        transform: translate(20px, -20px) rotate(5deg);
      }

      100% {
        transform: translate(-15px, 15px) rotate(-5deg);
      }
    }

    /* --- Neoskeuomorphic Glass --- */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      box-shadow:
        0 8px 32px 0 var(--glass-shadow),
        inset 0 1px 0 var(--glass-inner-shadow);
      transition: background 0.3s, border 0.3s, box-shadow 0.3s;
    }

    .hover-row:hover {
      background-color: var(--row-hover);
    }

    .glass-header {
      background: var(--header-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      transition: background 0.3s, border 0.3s;
    }

    .glass-input {
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(10px);
    }

    /* Custom Table Scrollbar */
    .custom-scroll::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(128, 128, 128, 0.3);
      border-radius: 10px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(128, 128, 128, 0.5);
    }

    /* Sticky identifier columns. STATE.stickyCols (array) drives which columns
       are pinned. renderTable adds .sticky-col + .sticky-col-N (with N = index)
       and .sticky-col-last on the rightmost pinned column. JS measures column
       widths and writes --sticky-left-N CSS variables for the offsets. */
    #maestro thead th.sticky-col {
      position: sticky;
      left: 0;
      z-index: 25;
      background: var(--sticky-header-bg);
    }

    #maestro tbody td.sticky-col {
      position: sticky;
      left: 0;
      z-index: 5;
      background: var(--sticky-body-bg);
      color: var(--text-main);
      font-weight: 600;
    }

    /* Per-index left offsets. .sticky-col-0 stays at 0; subsequent columns
       are pushed by the cumulative width of prior sticky columns (set by JS). */
    #maestro thead th.sticky-col-1,
    #maestro tbody td.sticky-col-1 { left: var(--sticky-left-1, 0px); }
    #maestro thead th.sticky-col-2,
    #maestro tbody td.sticky-col-2 { left: var(--sticky-left-2, 0px); }
    #maestro thead th.sticky-col-3,
    #maestro tbody td.sticky-col-3 { left: var(--sticky-left-3, 0px); }

    #maestro tbody tr:hover td.sticky-col {
      background: var(--sticky-body-hover-bg);
    }

    /* Right-edge fade only on the last pinned column (the visual boundary
       between the pinned area and the scrolling area). */
    #maestro thead th.sticky-col-last::after,
    #maestro tbody td.sticky-col-last::after {
      content: '';
      position: absolute;
      top: 0;
      right: -8px;
      bottom: 0;
      width: 8px;
      pointer-events: none;
      background: linear-gradient(to right, rgba(0, 0, 0, 0.18), transparent);
    }

    /* Empty / error values (#N/D, #N/A, #REF!, blanks, etc.) */
    .cell-empty {
      color: var(--text-muted) !important;
      opacity: 0.55;
      font-style: italic;
    }

    /* Toolbar: filter selects and tool buttons */
    .filter-select {
      background-color: var(--input-bg);
      color: var(--input-text);
      border: 1px solid var(--glass-border);
      border-radius: 0.5rem;
      padding: 0.45rem 1.9rem 0.45rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 500;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%2394a3b8'%3E%3Cpath d='M5 8l5 5 5-5H5z'/%3E%3C/svg%3E");
      background-position: right 0.4rem center;
      background-repeat: no-repeat;
      background-size: 1em;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      min-width: 8rem;
      max-width: 13rem;
    }

    .filter-select:hover {
      border-color: rgba(45, 212, 191, 0.45);
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--success-text);
      box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.18);
    }

    .filter-select[data-active="true"] {
      border-color: var(--success-text);
      color: var(--success-text);
    }

    /* Multi-select filter: button trigger + checkbox popover */
    .filter-multi {
      position: relative;
      display: inline-flex;
    }

    .filter-multi-trigger {
      background-color: var(--input-bg);
      color: var(--input-text);
      border: 1px solid var(--glass-border);
      border-radius: 0.5rem;
      padding: 0.45rem 0.45rem 0.45rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      min-width: 8rem;
      max-width: 13rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
    }

    .filter-multi-trigger:hover {
      border-color: rgba(45, 212, 191, 0.45);
    }

    .filter-multi.active .filter-multi-trigger {
      border-color: var(--success-text);
      color: var(--success-text);
    }

    .filter-multi-label {
      font-weight: 600;
    }

    .filter-multi-count {
      margin-left: auto;
      font-size: 0.7rem;
      opacity: 0.7;
      font-weight: 500;
    }

    .filter-multi.active .filter-multi-count {
      opacity: 1;
      background: rgba(45, 212, 191, 0.18);
      color: var(--success-text);
      padding: 0.05rem 0.45rem;
      border-radius: 999px;
      min-width: 1.25rem;
      text-align: center;
    }

    .filter-multi-chevron {
      font-size: 1.15em !important;
      opacity: 0.6;
      transition: transform 0.2s;
    }

    .filter-multi[aria-expanded="true"] .filter-multi-chevron,
    .filter-multi-trigger[aria-expanded="true"] .filter-multi-chevron {
      transform: rotate(180deg);
    }

    .filter-multi-popover {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 35;
      min-width: 100%;
      max-width: 280px;
      max-height: 280px;
      overflow-y: auto;
      background: var(--modal-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 0.65rem;
      box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.45);
      padding: 0.5rem;
    }

    .filter-multi-popover.hidden {
      display: none;
    }

    .popover-head {
      display: flex;
      gap: 0.4rem;
      padding-bottom: 0.4rem;
      margin-bottom: 0.3rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .popover-head button {
      flex: 1;
      background: transparent;
      border: 1px solid var(--glass-border);
      border-radius: 0.35rem;
      padding: 0.3rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .popover-head button:hover {
      border-color: var(--success-text);
      color: var(--success-text);
    }

    .popover-option {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.4rem 0.35rem;
      border-radius: 0.35rem;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--text-main);
      user-select: none;
    }

    .popover-option:hover {
      background: var(--row-hover);
    }

    .popover-option input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--glass-border);
      border-radius: 0.25rem;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      background: var(--input-bg);
      transition: background 0.15s, border-color 0.15s;
    }

    .popover-option input[type="checkbox"]:checked {
      background: var(--success-text);
      border-color: var(--success-text);
    }

    .popover-option input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #0b1220;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    /* In mobile drawer: popover becomes inline accordion */
    @media (max-width: 767px) {
      #filterDrawer .filter-multi {
        width: 100%;
        display: flex;
        flex-direction: column;
      }

      #filterDrawer .filter-multi-trigger {
        width: 100%;
        max-width: none;
        padding-top: 0.7rem;
        padding-bottom: 0.7rem;
        font-size: 0.85rem;
      }

      #filterDrawer .filter-multi-popover {
        position: static;
        max-width: none;
        margin-top: 0.45rem;
        box-shadow: none;
      }
    }

    .tool-button {
      background-color: var(--input-bg);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
      border-radius: 0.5rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background-color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      white-space: nowrap;
    }

    .tool-button:hover {
      border-color: rgba(45, 212, 191, 0.45);
      color: var(--success-text);
    }

    .tool-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Sortable column headers */
    #maestro thead th.sortable {
      cursor: pointer;
      user-select: none;
    }

    #maestro thead th.sortable:hover .sort-indicator {
      opacity: 0.8;
    }

    .sort-indicator {
      font-size: 1em;
      vertical-align: -4px;
      margin-left: 0.15rem;
      opacity: 0.25;
      transition: opacity 0.15s, color 0.15s;
    }

    .sort-indicator.active {
      opacity: 1;
      color: var(--success-text);
    }

    /* =========================================================
       Mobile filter drawer (< 768px).
       Same DOM element reused: on desktop it's an inline toolbar,
       on mobile it slides in from the right.
       ========================================================= */
    /* Elements hidden by default on desktop */
    #filterTrigger,
    #filterBackdrop,
    .drawer-header {
      display: none;
    }

    @media (max-width: 767px) {
      #filterDrawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(86vw, 340px);
        padding: 4rem 1rem 1rem;
        margin-bottom: 0;
        background: var(--modal-bg);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border-left: 1px solid var(--glass-border);
        box-shadow: -24px 0 48px -12px rgba(0, 0, 0, 0.5);
        transform: translateX(100%);
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 50;
        overflow-y: auto;
        flex-direction: column;
        flex-wrap: nowrap;
        align-items: stretch;
      }

      #filterDrawer.open {
        transform: translateX(0);
      }

      /* Drawer items go full-width vertical on mobile */
      #filterDrawer > * {
        width: 100%;
      }

      #filterDrawer .filter-select,
      #filterDrawer .tool-button {
        width: 100%;
        max-width: none;
        padding-top: 0.7rem;
        padding-bottom: 0.7rem;
        font-size: 0.85rem;
        justify-content: center;
      }

      #filterDrawer .drawer-controls {
        flex-direction: column;
        align-items: stretch;
        gap: 0.5rem;
        margin-left: 0 !important;
      }

      #filterDrawer #clearFilters {
        justify-content: center;
      }

      #filterDrawer .drawer-header {
        display: flex;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 0.9rem 1rem;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--glass-border);
        background: inherit;
      }

      #filterBackdrop {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.6);
        backdrop-filter: blur(2px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.28s ease-out;
        z-index: 45;
      }

      #filterBackdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      #filterTrigger {
        display: flex;
        position: fixed;
        top: 50%;
        right: 0;
        transform: translateY(-50%);
        z-index: 40;
        align-items: center;
        gap: 0.4rem;
        padding: 0.9rem 0.7rem;
        border-radius: 1rem 0 0 1rem;
        background: var(--glass-bg);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--glass-border);
        border-right: none;
        color: var(--text-main);
        box-shadow: -6px 4px 18px rgba(0, 0, 0, 0.3);
        cursor: pointer;
      }

      #filterTrigger:active {
        transform: translateY(-50%) scale(0.97);
      }

      #filterTrigger .material-symbols-outlined {
        font-size: 22px;
      }

      #filterTriggerBadge {
        position: absolute;
        top: 4px;
        right: 4px;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: 9px;
        background: var(--success-text);
        color: #0b1220;
        font-size: 10px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        border: 2px solid var(--modal-bg);
      }

      #filterTriggerBadge.hidden {
        display: none;
      }

      /* Don't let the drawer force body width */
      body.drawer-open {
        overflow: hidden;
      }
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      #filterDrawer,
      #filterBackdrop {
        transition: none;
      }
    }

    /* Bottom navigation (Maestro / ZQM tabs) */
    body {
      padding-bottom: calc(3.4rem + env(safe-area-inset-bottom, 0px));
    }

    #bottomNav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      display: flex;
      justify-content: center;
      gap: 0.25rem;
      background: var(--header-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      padding: 0.25rem 0.5rem calc(0.25rem + env(safe-area-inset-bottom, 0px));
    }

    #bottomNav .nav-item {
      flex: 1;
      max-width: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05rem;
      padding: 0.3rem 0.5rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 0.55rem;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: color 0.15s, background-color 0.15s;
    }

    #bottomNav .nav-item:hover {
      color: var(--text-main);
      background: var(--row-hover);
    }

    #bottomNav .nav-item.active {
      color: var(--success-text);
    }

    #bottomNav .nav-item.active .material-symbols-outlined {
      font-variation-settings: 'FILL' 1;
    }

    #bottomNav .nav-item .material-symbols-outlined {
      font-size: 19px;
    }

    /* =========================================================
       KPI dashboard inside the detail modal (used by ZQM view).
       ========================================================= */
    .kpi-modal {
      display: block;
    }

    .kpi-header {
      padding-bottom: 0.85rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .kpi-suerte {
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .kpi-sector {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      letter-spacing: 0.3px;
    }

    .kpi-date {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.55rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--success-text);
      background: rgba(45, 212, 191, 0.12);
      padding: 0.3rem 0.6rem;
      border-radius: 999px;

              onclick="closeModal()">Cerrar</button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    // =======================
    // CONFIGURACIÓN
    // =======================
    // NOTE: `version` below MUST match service-worker.js (CACHE_VERSION),
    // index.html (APP_VERSION) and the <span id="appVersion"> text in the header.
    const CONFIG = {
      version: 'v2.1.0',
      csvFile: 'maestro.csv',
      pageSize: 25
    };

    // =======================
    // VIEWS (Maestro / ZQM)
    // =======================
    // Two independent views living in the same UI. STATE is an alias to the
    // active view's state object. switchView(key) swaps the alias and rebuilds
    // the UI from the target view's stored state.
    function makeViewState() {
      return {
        headers: [],
        rows: [],
        filteredRows: [],
        currentPage: 1,
        sortColumn: -1,
        sortDirection: 'asc',
        corteColumnIndex: -1,
        edadColumnIndex: -1,
        modalRowIndex: -1,
        multiFilters: { corte: new Set(), edad: new Set() },
        singleFilters: {},   // keyed by selectId
        searchValue: '',
        loaded: false
      };
    }

    const VIEWS = {
      maestro: Object.assign(makeViewState(), {
        key: 'maestro',
        csvFile: 'maestro.csv',
        appTitleHtml: 'Maestro de <span class="text-teal-400">Suertes</span>',
        captionBase: 'Maestro de Suertes',
        searchPlaceholder: 'Buscar por suerte, zona, finca o código...',
        exportPrefix: 'maestro-suertes',
        stickyCols: [0],       // SUERTE
        processor: 'maestro',  // custom edad-hoy calculation
        modalRenderer: 'kpi',
        modalTitle: 'Detalle de la Suerte',
        filterConfig: [
          { key: 'zona',     selectId: 'filterZona',     label: 'Todas las zonas',     match: h => normalizeHeader(h) === 'ZONA',             index: -1 },
          { key: 'finca',    selectId: 'filterFinca',    label: 'Todas las fincas',    match: h => normalizeHeader(h) === 'FINCA',            index: -1 },
          { key: 'variedad', selectId: 'filterVariedad', label: 'Todas las variedades', match: h => normalizeHeader(h) === 'VARIEDAD',        index: -1 },
          { key: 'uso',      selectId: 'filterUso',      label: 'Todos los usos',      match: h => normalizeHeader(h) === 'USO DE LA SUERTE', index: -1 }
        ],
        multiConfig: {
          corte: { label: 'Corte', allLabel: 'Todos', match: h => normalizeHeader(h) === 'NUMERO DE CORTE' },
          // Maestro uses the calculated "EDAD HOY MESES" column (set by processor).
          edad:  { label: 'Edad',  allLabel: 'Todas', useCalculated: true }
        }
      }),
      zqm: Object.assign(makeViewState(), {
        key: 'zqm',
        csvFile: 'zqm.csv',
        appTitleHtml: 'ZQM<span class="text-teal-400">101</span>',
        captionBase: 'ZQM101 - Histórico de Cortes',
        searchPlaceholder: 'Buscar por suerte, sector, año...',
        exportPrefix: 'zqm-cortes',
        stickyCols: [0, 1],    // AÑO + Ubic Técnica
        processor: 'generic',
        modalRenderer: 'kpi',
        modalTitle: 'Detalle del Corte',
        filterConfig: [
          // Tolerant to AÑO / AÑO / ANO variations across encodings.
          { key: 'ano',    selectId: 'filterZona',     label: 'Todos los años',     match: h => { const n = normalizeHeader(h); return n === 'AÑO' || n === 'ANO' || n === 'AÃO'; }, index: -1 },
          { key: 'sector', selectId: 'filterFinca',    label: 'Todos los sectores', match: h => normalizeHeader(h) === 'SECTOR', index: -1 },
          { key: 'mes',    selectId: 'filterVariedad', label: 'Todos los meses',    match: h => normalizeHeader(h) === 'MES',    index: -1 },
          // "Ubic Técnica" — tolerate "Técnica" / "Tecnica" / encoding variants.
          { key: 'ubic',   selectId: 'filterUso',      label: 'Todas las ubic.',    match: h => normalizeHeader(h).startsWith('UBIC'), index: -1 }
        ],
        multiConfig: {
          corte: { label: 'Corte', allLabel: 'Todos', match: h => normalizeHeader(h) === 'CORTE' },
          edad:  { label: 'Edad',  allLabel: 'Todas', match: h => normalizeHeader(h) === 'EDAD' }
        }
      })
    };

    let CURRENT_VIEW_KEY = 'maestro';
    let STATE = VIEWS[CURRENT_VIEW_KEY];

    // Google Sheets / Excel error sentinels that sometimes leak into CSV exports
    const ERROR_VALUES = new Set([
      '#N/D', '#N/A', '#REF!', '#VALUE!', '#DIV/0!', '#NAME?',
      '#NULL!', '#NUM!', '#ERROR!', 'NULL', 'UNDEFINED'
    ]);

    function sanitizeCell(val) {
      if (val === null || val === undefined) return { text: '—', isEmpty: true };
      const s = String(val).trim();
      if (s === '') return { text: '—', isEmpty: true };
      if (ERROR_VALUES.has(s.toUpperCase())) {
        return { text: '—', isEmpty: true, original: s };
      }
      return { text: String(val), isEmpty: false };
    }

    // Normalize a header string for tolerant matching across encodings and whitespace.
    // Returns uppercase, single-spaced, trimmed form. Does NOT strip non-ASCII so
    // that match functions can still check for "AÑO" etc. when the file is correctly
    // encoded UTF-8.
    function normalizeHeader(h) {
      return (h || '').toString().toUpperCase().replace(/\s+/g, ' ').trim();
    }

    // RFC 4180-ish CSV parser: respects double-quoted fields, escaped "" inside quotes,
    // and embedded newlines in quoted cells. Skips fully-empty lines. Strips a leading
    // UTF-8 BOM if present.
    function parseCsvText(text, sep) {
      // Strip UTF-8 BOM in its various shapes
      if (text.charCodeAt(0) === 0xFEFF) {
        text = text.slice(1);
      } else if (text.startsWith('ï»¿')) {
        // Mis-decoded BOM (UTF-8 bytes read as Latin-1)
        text = text.slice(3);
      }

      const rows = [];
      let cur = '';
      let row = [];
      let inQuotes = false;
      const len = text.length;
      let i = 0;

      while (i < len) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"') {
            if (text[i + 1] === '"') { cur += '"'; i += 2; continue; }
            inQuotes = false;
            i++;
          } else {
            cur += ch;
            i++;
          }
        } else {
          if (ch === '"' && cur === '') { inQuotes = true; i++; }
          else if (ch === sep) { row.push(cur); cur = ''; i++; }
          else if (ch === '\r') { i++; }
          else if (ch === '\n') {
            row.push(cur); cur = '';
            if (!(row.length === 1 && row[0] === '')) rows.push(row);
            row = [];
            i++;
          } else {
            cur += ch;
            i++;
          }
        }
      }
      // Flush last cell / row when file has no trailing newline
      if (cur !== '' || row.length > 0) {
        row.push(cur);
        if (!(row.length === 1 && row[0] === '')) rows.push(row);
      }
      return rows;
    }

    // Try to read a value as a number, tolerating "4,43" (comma decimals) and thousands dots.
    function parseLocaleNumber(val) {
      if (val === null || val === undefined) return NaN;
      const s = String(val).trim();
      if (s === '' || ERROR_VALUES.has(s.toUpperCase())) return NaN;
      // Remove spaces; treat comma as decimal if no dot present, otherwise as thousand sep.
      const hasDot = s.includes('.');
      const hasComma = s.includes(',');
      let cleaned = s.replace(/\s/g, '');
      if (hasComma && !hasDot) cleaned = cleaned.replace(',', '.');
      else if (hasComma && hasDot) cleaned = cleaned.replace(/,/g, '');
      const n = Number(cleaned);
      return isNaN(n) ? NaN : n;
    }

    // =======================
    // SERVICE WORKER
    // =======================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => {
          // Check if there's already a waiting worker
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }

          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              // Once installed, force update immediately
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }

    // =======================
    // LÓGICA DE DATOS
    // =======================
    async function initApp() {
      checkConnection();
      window.addEventListener('online', checkConnection);
      window.addEventListener('offline', checkConnection);

      applyViewStaticUi();  // title, placeholder, nav state, initial labels

      try {
        const response = await fetch(STATE.csvFile);
        if (!response.ok) throw new Error(`Error ${response.status}`);
        const text = await response.text();
        processData(text);
        STATE.loaded = true;
      } catch (error) {
        console.error('Fallo carga:', error);
        tryFallbackCache();
      }
    }

    async function tryFallbackCache() {
      try {
        const cache = await caches.match(STATE.csvFile);
        if (cache) {
          const text = await cache.text();
          processData(text);
          STATE.loaded = true;
          // Force logic to show offline banner even if navigator says online (cache mismatch)
          document.getElementById('offlineBanner').classList.remove('hidden');
        } else {
          showError('No se pudieron cargar los datos.', 'Revisa tu conexión o asegúrate de haber abierto la app online al menos una vez.');
        }
      } catch (e) {
        showError('Error Crítico', 'No se pudo acceder al almacenamiento local.');
      }
    }

    function processData(csvText) {
      if (!csvText.trim()) return showError('Datos Vacíos', `El archivo ${STATE.csvFile} está vacío.`);

      // Detect separator from the first physical line. Headers rarely contain quotes,
      // so this heuristic is safe in practice.
      const firstLineEnd = csvText.search(/\r?\n/);
      const firstLine = firstLineEnd === -1 ? csvText : csvText.slice(0, firstLineEnd);
      const separator = firstLine.includes(';') ? ';' : ',';

      const allRows = parseCsvText(csvText, separator);
      if (allRows.length < 2) return showError('Formato Inválido', 'El archivo no tiene cabeceras o datos.');

      STATE.headers = allRows[0].map(h => h.trim());

      // View-specific row processing
      if (STATE.processor === 'maestro') {
        processRowsMaestro(allRows);
      } else {
        processRowsGeneric(allRows);
      }

      // Init View (shared)
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('loadingMsg').classList.add('hidden');
      document.getElementById('tableContainer').classList.remove('hidden');

      // Force header rebuild (in case we switched views — headers differ)
      const thead = document.querySelector('#maestro thead');
      if (thead) thead.innerHTML = '';

      // Accessible table caption with total count
      const caption = document.getElementById('tableCaption');
      if (caption) {
        caption.textContent = `${STATE.captionBase} — ${STATE.rows.length} registros`;
      }

      setupScrollFade();
      populateFilters();

      // Restore persisted page-size preference (if any)
      try {
        const saved = parseInt(localStorage.getItem('pageSize') || '', 10);
        if (saved > 0) {
          CONFIG.pageSize = saved;
          document.getElementById('pageSizeSelect').value = String(saved);
        }
      } catch (_) { /* ignore */ }

      applyFiltersAndSort();
    }

    // Maestro-specific: compute "EDAD HOY MESES" per row from planting/cut dates.
    function processRowsMaestro(allRows) {
      const variedadIdx = STATE.headers.findIndex(h => h.toUpperCase().trim() === 'VARIEDAD');
      const fechaSiembraIdx = STATE.headers.findIndex(h =>
        h.toUpperCase().replace(/\s+/g, ' ').trim() === 'FECHA DE SIEMBRA' ||
        (h.toUpperCase().includes('FECHA') && h.toUpperCase().includes('SIEMBRA'))
      );
      const fechaUltimoCorteIdx = STATE.headers.findIndex(h =>
        h.toUpperCase().replace(/\s+/g, ' ').trim() === 'FECHA DE ULTIMO CORTE' ||
        h.toUpperCase().replace(/\s+/g, ' ').trim() === 'FECHA DE ÚLTIMO CORTE' ||
        (h.toUpperCase().includes('FECHA') && h.toUpperCase().includes('ULTIMO') && h.toUpperCase().includes('CORTE'))
      );

      const edadHoyIdx = STATE.headers.findIndex(h => {
        const header = h.toUpperCase().trim();
        return header === 'EDAD' ||
          header === 'EDAD MESES' ||
          (header.includes('EDAD') && !header.includes('VARIEDAD') && !header.includes('PROMEDIO'));
      });

      if (edadHoyIdx !== -1) {
        STATE.edadColumnIndex = edadHoyIdx;
      } else {
        STATE.headers.push('EDAD HOY MESES');
        STATE.edadColumnIndex = STATE.headers.length - 1;
      }

      STATE.rows = [];
      const now = new Date();
      for (let i = 1; i < allRows.length; i++) {
        const cells = allRows[i];
        if (cells.length <= 1) continue;
        const row = cells.map(c => c.trim());
        let edadMeses = '0.0';
        try {
          const variedad = variedadIdx > -1 ? row[variedadIdx].toUpperCase() : '';
          const fechaSiembraStr = fechaSiembraIdx > -1 ? row[fechaSiembraIdx] : '';
          const fechaCorteStr = fechaUltimoCorteIdx > -1 ? row[fechaUltimoCorteIdx] : '';
          if (variedad === 'RENOVACION' || variedad === 'RENOVACIÓN') {
            edadMeses = '0.0';
          } else {
            const fechaSiembra = parseDate(fechaSiembraStr);
            const fechaCorte = parseDate(fechaCorteStr);
            let fechaRef = fechaSiembra;
            if (fechaCorte && fechaSiembra && fechaCorte > fechaSiembra) fechaRef = fechaCorte;
            if (fechaRef) {
              const diffTime = Math.abs(now - fechaRef);
              const daysDiff = diffTime / (1000 * 60 * 60 * 24);
              edadMeses = (daysDiff / (365.25 / 12)).toFixed(1);
            }
          }
        } catch (e) { console.warn(e); }
        if (edadHoyIdx !== -1) row[edadHoyIdx] = edadMeses;
        else row.push(edadMeses);
        STATE.rows.push(row);
      }
    }

    // Generic: just trim cells and skip empty rows. No derived columns.
    function processRowsGeneric(allRows) {
      STATE.rows = [];
      for (let i = 1; i < allRows.length; i++) {
        const cells = allRows[i];
        if (cells.length <= 1) continue;
        STATE.rows.push(cells.map(c => c.trim()));
      }
      // edadColumnIndex is set later by populateMultiFilters using view config
      STATE.edadColumnIndex = -1;
    }

    // Helper: Parse DD/MM/YYYY or YYYY-MM-DD
    function parseDate(dateStr) {
      if (!dateStr) return null;
      // Handle DD/MM/YYYY
      if (dateStr.includes('/')) {
        const parts = dateStr.split('/');
        if (parts.length === 3) {
          // Assume DD/MM/YYYY
          return new Date(parts[2], parts[1] - 1, parts[0]);
        }
      }
      // Handle YYYY-MM-DD
      if (dateStr.includes('-')) {
        return new Date(dateStr);
      }
      return null;
    }

    // =======================
    // RENDERIZADO
    // =======================
    function renderTable() {
      const tbody = document.querySelector('#maestro tbody');
      const thead = document.querySelector('#maestro thead');

      // Per-view set of sticky column indices, sorted ascending.
      const stickies = (STATE.stickyCols || []).slice().sort((a, b) => a - b);
      const lastSticky = stickies.length ? stickies[stickies.length - 1] : -1;

      // Render Headers: rebuild when empty (first time or after view switch).
      if (thead.rows.length === 0) {
        thead.innerHTML = '';
        const tr = document.createElement('tr');
        STATE.headers.forEach((h, index) => {
          const th = document.createElement('th');
          th.className = "px-4 py-2.5 whitespace-nowrap tracking-wider font-bold shadow-sm sortable";
          th.setAttribute('scope', 'col');
          th.setAttribute('aria-sort', 'none');
          th.style.color = "var(--table-header-text)";

          // Sticky identifier columns: styled by CSS via .sticky-col + index.
          if (stickies.includes(index)) {
            th.classList.add('sticky-col', `sticky-col-${index}`);
            if (index === lastSticky) th.classList.add('sticky-col-last');
          } else {
            th.style.background = "var(--table-header-bg)";
          }

          if (index === STATE.edadColumnIndex) {
            th.style.color = "var(--success-text)";
            th.style.borderBottom = "2px solid var(--success-bg)";
          }

          const label = document.createElement('span');
          label.textContent = h;
          const indicator = document.createElement('span');
          indicator.className = 'sort-indicator material-symbols-outlined';
          indicator.textContent = 'unfold_more';

          th.appendChild(label);
          th.appendChild(indicator);
          th.addEventListener('click', () => toggleSort(index));
          tr.appendChild(th);
        });
        thead.appendChild(tr);
        // Sync sort indicators with stored sort state (e.g., when re-rendering
        // headers after a view switch that had a sort applied).
        updateSortIndicators();
      }

      // Pagination
      const totalPages = Math.ceil(STATE.filteredRows.length / CONFIG.pageSize) || 1;
      if (STATE.currentPage > totalPages) STATE.currentPage = 1;

      const start = (STATE.currentPage - 1) * CONFIG.pageSize;
      const pageData = STATE.filteredRows.slice(start, start + CONFIG.pageSize);

      const fragment = document.createDocumentFragment();
      pageData.forEach((row, i) => {
        const filteredIdx = start + i;
        const tr = document.createElement('tr');
        tr.className = "transition-colors duration-150 group cursor-pointer border-b border-gray-700/20 hover-row";
        tr.onclick = () => showRowDetails(filteredIdx);

        row.forEach((cell, index) => {
          const td = document.createElement('td');
          td.className = "px-4 py-2.5 whitespace-nowrap transition-colors";

          // Sticky identifier columns: CSS handles color/background.
          if (stickies.includes(index)) {
            td.classList.add('sticky-col', `sticky-col-${index}`);
            if (index === lastSticky) td.classList.add('sticky-col-last');
          } else {
            td.style.color = "var(--text-muted)";
          }

          // Styling for Age Column
          if (index === STATE.edadColumnIndex) {
            td.style.color = "var(--success-text)";
            td.style.fontWeight = "bold";
            td.style.backgroundColor = "var(--success-bg)";
          }

          const sanitized = sanitizeCell(cell);
          td.textContent = sanitized.text;
          if (sanitized.isEmpty) {
            td.classList.add('cell-empty');
            if (sanitized.original) {
              td.title = `Valor original: ${sanitized.original}`;
            }
          }

          tr.appendChild(td);
        });
        fragment.appendChild(tr);
      });

      tbody.innerHTML = '';
      tbody.appendChild(fragment);

      // UI Updates
      document.getElementById('pageInfo').textContent =
        `PÁG ${STATE.currentPage} / ${totalPages}`;

      document.getElementById('prevPage').disabled = STATE.currentPage === 1;
      document.getElementById('nextPage').disabled = STATE.currentPage >= totalPages;

      // Re-evaluate horizontal-scroll hint and sticky offsets after content swap
      requestAnimationFrame(() => {
        updateScrollFade();
        updateStickyOffsets();
      });
    }

    // =======================
    // MOBILE FILTER DRAWER
    // =======================
    const MOBILE_MQ = window.matchMedia('(max-width: 767px)');

    function isDrawerMode() {
      return MOBILE_MQ.matches;
    }

    function openFilterDrawer() {
      if (!isDrawerMode()) return;
      const drawer = document.getElementById('filterDrawer');
      const backdrop = document.getElementById('filterBackdrop');
      const trigger = document.getElementById('filterTrigger');
      drawer.classList.add('open');
      backdrop.classList.add('open');
      trigger.setAttribute('aria-expanded', 'true');
      document.body.classList.add('drawer-open');
      // Focus first select for keyboard users
      const first = drawer.querySelector('select, button:not([aria-label="Cerrar filtros"])');
      if (first) first.focus();
    }

    function closeFilterDrawer() {
      const drawer = document.getElementById('filterDrawer');
      const backdrop = document.getElementById('filterBackdrop');
      const trigger = document.getElementById('filterTrigger');
      const wasOpen = drawer.classList.contains('open');
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
      document.body.classList.remove('drawer-open');
      if (wasOpen && isDrawerMode()) trigger.focus();
    }

    function toggleFilterDrawer() {
      const drawer = document.getElementById('filterDrawer');
      if (drawer.classList.contains('open')) closeFilterDrawer();
      else openFilterDrawer();
    }

    function isFilterDrawerOpen() {
      return document.getElementById('filterDrawer').classList.contains('open');
    }

    // When crossing from mobile to desktop, force-reset drawer state so nothing
    // stays in a half-broken "open" layout.
    MOBILE_MQ.addEventListener('change', (e) => {
      if (!e.matches) {
        document.getElementById('filterDrawer').classList.remove('open');
        document.getElementById('filterBackdrop').classList.remove('open');
        document.getElementById('filterTrigger').setAttribute('aria-expanded', 'false');
        document.body.classList.remove('drawer-open');
      }
    });

    // =======================
    // VIEW SWITCHING
    // =======================
    // Applies labels and placeholders that differ between views.
    function applyViewStaticUi() {
      const titleEl = document.getElementById('appTitleText');
      if (titleEl) titleEl.innerHTML = STATE.appTitleHtml;

      const modalTitleEl = document.getElementById('modalTitleText');
      if (modalTitleEl && STATE.modalTitle) modalTitleEl.textContent = STATE.modalTitle;

      const input = document.getElementById('searchInput');
      if (input) input.placeholder = STATE.searchPlaceholder;

      // Bottom nav active state
      document.querySelectorAll('#bottomNav .nav-item').forEach(btn => {
        const active = btn.dataset.view === CURRENT_VIEW_KEY;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-current', active ? 'page' : 'false');
      });

      // Initial "all" option labels (in case selects haven't been populated yet)
      STATE.filterConfig.forEach(col => {
        const s = document.getElementById(col.selectId);
        if (s && s.options[0]) s.options[0].textContent = col.label;
      });
    }

    // Persists current UI inputs into the active view's state before switching out.
    function saveViewUiSnapshot() {
      STATE.singleFilters = {};
      STATE.filterConfig.forEach(col => {
        const s = document.getElementById(col.selectId);
        STATE.singleFilters[col.selectId] = s ? s.value : '';
      });
      const input = document.getElementById('searchInput');
      STATE.searchValue = input ? input.value : '';
    }

    // Restores UI inputs from the (now-active) view's state.
    // Options must already be populated before calling this.
    function restoreViewUiSnapshot() {
      STATE.filterConfig.forEach(col => {
        const s = document.getElementById(col.selectId);
        if (!s) return;
        const saved = (STATE.singleFilters && STATE.singleFilters[col.selectId]) || '';
        // Only restore if the value still exists among the repopulated options
        const exists = Array.from(s.options).some(o => o.value === saved);
        s.value = exists ? saved : '';
      });
      const input = document.getElementById('searchInput');
      if (input) input.value = STATE.searchValue || '';
    }

    async function switchView(targetKey) {
      if (targetKey === CURRENT_VIEW_KEY) return;
      if (!VIEWS[targetKey]) return;

      // Close transient UI (modal, drawer, popovers)
      closeAllMultiPopovers();
      if (isFilterDrawerOpen()) closeFilterDrawer();
      const modal = document.getElementById('detailModal');
      if (modal && !modal.classList.contains('hidden')) closeModal();

      // Save current view's UI state, then swap the alias.
      saveViewUiSnapshot();
      CURRENT_VIEW_KEY = targetKey;
      STATE = VIEWS[targetKey];

      applyViewStaticUi();

      // Force header rebuild on next renderTable
      const thead = document.querySelector('#maestro thead');
      if (thead) thead.innerHTML = '';

      if (!STATE.loaded) {
        // First time opening this view — fetch CSV lazily.
        document.getElementById('tableContainer').classList.add('hidden');
        const loadingEl = document.getElementById('loadingMsg');
        loadingEl.classList.remove('hidden');
        loadingEl.style.display = '';
        try {
          const response = await fetch(STATE.csvFile);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          // Abort if the user switched away while we were loading.
          if (CURRENT_VIEW_KEY !== targetKey) return;
          processData(text);  // processData calls populateFilters + applyFiltersAndSort
          STATE.loaded = true;
        } catch (err) {
          console.error('[switchView] fallo carga', err);
          if (CURRENT_VIEW_KEY === targetKey) tryFallbackCache();
        }
      } else {
        // Already loaded: repopulate filter options from this view's data,
        // restore saved select/search values, and re-render.
        populateFilters();
        restoreViewUiSnapshot();
        applyFiltersAndSort();
      }
    }

    function updateFilterBadge() {
      let count = STATE.filterConfig.filter(c => {
        const s = document.getElementById(c.selectId);
        return s && s.value;
      }).length;
      Object.keys(STATE.multiFilters).forEach(k => {
        if (STATE.multiFilters[k].size > 0) count++;
      });
      const badge = document.getElementById('filterTriggerBadge');
      if (!badge) return;
      if (count > 0) {
        badge.textContent = String(count);
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }

    // Shows/hides the right-edge gradient to hint horizontal scroll is available.
    function updateScrollFade() {
      const scroller = document.getElementById('tableScroll');
      const fade = document.getElementById('scrollFadeRight');
      if (!scroller || !fade) return;
      const remaining = scroller.scrollWidth - scroller.clientWidth - scroller.scrollLeft;
      fade.classList.toggle('visible', remaining > 8);
    }

    // Measure widths of pinned columns and publish --sticky-left-N CSS vars
    // so columns 1, 2, ... start right after the cumulative width of prior
    // pinned columns. Called after every render and on resize.
    function updateStickyOffsets() {
      const stickies = (STATE.stickyCols || []).slice().sort((a, b) => a - b);
      if (stickies.length <= 1) return;
      const ths = document.querySelectorAll('#maestro thead th');
      if (!ths.length) return;
      let cumLeft = 0;
      stickies.forEach(idx => {
        document.documentElement.style.setProperty(`--sticky-left-${idx}`, `${cumLeft}px`);
        const th = ths[idx];
        if (th) cumLeft += th.getBoundingClientRect().width;
      });
    }

    function setupScrollFade() {
      const scroller = document.getElementById('tableScroll');
      if (!scroller) return;
      scroller.addEventListener('scroll', updateScrollFade, { passive: true });
      window.addEventListener('resize', () => {
        updateScrollFade();
        updateStickyOffsets();
      });
      requestAnimationFrame(updateScrollFade);
      requestAnimationFrame(updateStickyOffsets);
    }

    // =======================
    // FILTROS / ORDEN / EXPORT
    // =======================
    function populateFilters() {
      STATE.filterConfig.forEach(col => {
        // match receives raw header; match fn normalizes internally.
        const idx = STATE.headers.findIndex(h => col.match(h));
        col.index = idx;
        const select = document.getElementById(col.selectId);
        if (!select) return;

        // Refresh the "all" option label from the active view's config.
        if (select.options[0]) select.options[0].textContent = col.label;

        if (idx === -1) {
          select.style.display = 'none';
          return;
        }
        select.style.display = '';

        const values = [...new Set(
          STATE.rows
            .map(r => (r[idx] || '').trim())
            .filter(v => v !== '' && !ERROR_VALUES.has(v.toUpperCase()))
        )].sort((a, b) => a.localeCompare(b, 'es', { numeric: true }));

        // Clear any stale dynamic options but keep the "all" option (index 0).
        while (select.options.length > 1) select.remove(1);

        for (const v of values) {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          select.appendChild(opt);
        }
      });

      populateMultiFilters();
    }

    function populateMultiFilters() {
      // Corte: integer values; column name per view config.
      const cfgC = STATE.multiConfig.corte;
      const corteIdx = cfgC && cfgC.match ? STATE.headers.findIndex(cfgC.match) : -1;
      STATE.corteColumnIndex = corteIdx;
      const corteContainer = document.querySelector('.filter-multi[data-key="corte"]');
      if (corteIdx === -1) {
        if (corteContainer) corteContainer.style.display = 'none';
      } else {
        if (corteContainer) corteContainer.style.display = '';
        const values = [...new Set(
          STATE.rows.map(r => {
            const v = String(r[corteIdx] || '').trim();
            const n = parseInt(v, 10);
            return isNaN(n) ? null : n;
          }).filter(n => n !== null)
        )].sort((a, b) => a - b);
        renderMultiOptions('corte', values.map(v => ({ value: v, label: `Corte ${v}` })));
      }

      // Edad: bucket by floor(value). For maestro, uses the calculated column
      // set by the processor. For ZQM, we look up the raw "EDAD" column here.
      const cfgE = STATE.multiConfig.edad;
      let edadIdx;
      if (cfgE && cfgE.useCalculated) {
        edadIdx = STATE.edadColumnIndex;
      } else if (cfgE && cfgE.match) {
        edadIdx = STATE.headers.findIndex(cfgE.match);
        STATE.edadColumnIndex = edadIdx;
      } else {
        edadIdx = -1;
      }
      const edadContainer = document.querySelector('.filter-multi[data-key="edad"]');
      if (edadIdx === -1) {
        if (edadContainer) edadContainer.style.display = 'none';
      } else {
        if (edadContainer) edadContainer.style.display = '';
        const buckets = [...new Set(
          STATE.rows.map(r => {
            const v = parseFloat(String(r[edadIdx] || '').replace(',', '.'));
            return isNaN(v) ? null : Math.floor(v);
          }).filter(n => n !== null)
        )].sort((a, b) => a - b);
        renderMultiOptions('edad', buckets.map(v => ({
          value: v,
          label: `${v}–${v + 1} meses`
        })));
      }
    }

    function renderMultiOptions(key, options) {
      const container = document.getElementById(`${key}Options`);
      if (!container) return;
      container.innerHTML = '';
      options.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'popover-option';

        const input = document.createElement('input');
        input.type = 'checkbox';
        input.value = String(opt.value);
        input.dataset.multi = key;
        // Preserve selection when repopulating (e.g., after view switch)
        input.checked = STATE.multiFilters[key].has(opt.value);
        input.addEventListener('change', (e) => {
          const v = parseInt(e.target.value, 10);
          if (e.target.checked) STATE.multiFilters[key].add(v);
          else STATE.multiFilters[key].delete(v);
          updateMultiLabel(key);
          applyFiltersAndSort();
        });

        const span = document.createElement('span');
        span.textContent = opt.label;

        label.appendChild(input);
        label.appendChild(span);
        container.appendChild(label);
      });
      updateMultiLabel(key);
    }

    function updateMultiLabel(key) {
      const container = document.querySelector(`.filter-multi[data-key="${key}"]`);
      if (!container) return;
      const countEl = container.querySelector('.filter-multi-count');
      const size = STATE.multiFilters[key].size;
      const cfg = STATE.multiConfig && STATE.multiConfig[key];
      const allLabel = (cfg && cfg.allLabel) || 'Todos';
      if (size === 0) {
        container.classList.remove('active');
        countEl.textContent = allLabel;
      } else {
        container.classList.add('active');
        countEl.textContent = String(size);
      }
      // Also update the button label from config (e.g., "Edad" / "Corte")
      const labelEl = container.querySelector('.filter-multi-label');
      if (labelEl && cfg && cfg.label) labelEl.textContent = cfg.label;
    }

    function toggleMultiPopover(key) {
      const popover = document.getElementById(`${key}Popover`);
      const trigger = document.querySelector(`.filter-multi[data-key="${key}"] .filter-multi-trigger`);
      const isOpen = !popover.classList.contains('hidden');

      closeAllMultiPopovers();

      if (!isOpen) {
        popover.classList.remove('hidden');
        trigger.setAttribute('aria-expanded', 'true');
      }
    }

    function closeAllMultiPopovers() {
      document.querySelectorAll('.filter-multi-popover').forEach(p => p.classList.add('hidden'));
      document.querySelectorAll('.filter-multi-trigger').forEach(t => t.setAttribute('aria-expanded', 'false'));
    }

    function selectAllMulti(key) {
      const options = document.querySelectorAll(`#${key}Options input[type="checkbox"]`);
      STATE.multiFilters[key].clear();
      options.forEach(cb => {
        cb.checked = true;
        STATE.multiFilters[key].add(parseInt(cb.value, 10));
      });
      updateMultiLabel(key);
      applyFiltersAndSort();
    }

    function clearMulti(key) {
      const options = document.querySelectorAll(`#${key}Options input[type="checkbox"]`);
      STATE.multiFilters[key].clear();
      options.forEach(cb => { cb.checked = false; });
      updateMultiLabel(key);
      applyFiltersAndSort();
    }

    // Close any open multi-filter popover when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.filter-multi')) closeAllMultiPopovers();
    });

    function applyFiltersAndSort() {
      const term = (document.getElementById('searchInput').value || '').toLowerCase();

      let rows = STATE.rows;

      // Column filters
      STATE.filterConfig.forEach(col => {
        if (col.index === -1) return;
        const select = document.getElementById(col.selectId);
        const value = select ? select.value : '';
        select.dataset.active = value ? 'true' : 'false';
        if (!value) return;
        rows = rows.filter(r => (r[col.index] || '').trim() === value);
      });

      // Multi-filter: Número de corte (integer values)
      if (STATE.corteColumnIndex !== -1 && STATE.multiFilters.corte.size > 0) {
        const idx = STATE.corteColumnIndex;
        rows = rows.filter(r => {
          const n = parseInt(String(r[idx] || '').trim(), 10);
          return !isNaN(n) && STATE.multiFilters.corte.has(n);
        });
      }

      // Multi-filter: Edad (floor(value) buckets)
      if (STATE.edadColumnIndex !== -1 && STATE.multiFilters.edad.size > 0) {
        const idx = STATE.edadColumnIndex;
        rows = rows.filter(r => {
          const v = parseFloat(String(r[idx] || '').replace(',', '.'));
          if (isNaN(v)) return false;
          return STATE.multiFilters.edad.has(Math.floor(v));
        });
      }

      // Text search (applies over already column-filtered rows for cheaper scan)
      if (term) {
        rows = rows.filter(row => row.some(cell => (cell || '').toLowerCase().includes(term)));
      }

      // Sort
      if (STATE.sortColumn !== -1) {
        const col = STATE.sortColumn;
        const dir = STATE.sortDirection === 'asc' ? 1 : -1;
        rows = [...rows].sort((a, b) => {
          const av = a[col];
          const bv = b[col];
          const aEmpty = av === undefined || av === null || String(av).trim() === '';
          const bEmpty = bv === undefined || bv === null || String(bv).trim() === '';
          // Push empty/error to the end regardless of direction
          if (aEmpty && bEmpty) return 0;
          if (aEmpty) return 1;
          if (bEmpty) return -1;

          const an = parseLocaleNumber(av);
          const bn = parseLocaleNumber(bv);
          if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;

          const ad = parseDate(av);
          const bd = parseDate(bv);
          if (ad && bd) return (ad - bd) * dir;

          return String(av).localeCompare(String(bv), 'es', { numeric: true }) * dir;
        });
      }

      STATE.filteredRows = rows;
      STATE.currentPage = 1;

      // Toggle clear-filters button
      const anyActive = !!term
        || STATE.filterConfig.some(c => {
          const s = document.getElementById(c.selectId);
          return s && s.value;
        })
        || Object.keys(STATE.multiFilters).some(k => STATE.multiFilters[k].size > 0);
      document.getElementById('clearFilters').classList.toggle('hidden', !anyActive);

      // Update results count
      const countEl = document.getElementById('resultCount');
      if (countEl) {
        countEl.textContent = anyActive
          ? `${STATE.filteredRows.length} de ${STATE.rows.length}`
          : `${STATE.rows.length}`;
      }

      updateFilterBadge();

      renderTable();
    }

    function clearAllFilters() {
      document.getElementById('searchInput').value = '';
      STATE.filterConfig.forEach(col => {
        const s = document.getElementById(col.selectId);
        if (s) s.value = '';
      });
      Object.keys(STATE.multiFilters).forEach(key => {
        STATE.multiFilters[key].clear();
        document.querySelectorAll(`#${key}Options input[type="checkbox"]`).forEach(cb => cb.checked = false);
        updateMultiLabel(key);
      });
      applyFiltersAndSort();
    }

    function toggleSort(columnIndex) {
      if (STATE.sortColumn === columnIndex) {
        if (STATE.sortDirection === 'asc') {
          STATE.sortDirection = 'desc';
        } else {
          // Third click: reset to natural order
          STATE.sortColumn = -1;
          STATE.sortDirection = 'asc';
        }
      } else {
        STATE.sortColumn = columnIndex;
        STATE.sortDirection = 'asc';
      }
      updateSortIndicators();
      applyFiltersAndSort();
    }

    function updateSortIndicators() {
      document.querySelectorAll('#maestro thead th').forEach((th, i) => {
        const ind = th.querySelector('.sort-indicator');
        if (!ind) return;
        if (STATE.sortColumn === i) {
          ind.textContent = STATE.sortDirection === 'asc' ? 'arrow_upward' : 'arrow_downward';
          ind.classList.add('active');
          th.setAttribute('aria-sort', STATE.sortDirection === 'asc' ? 'ascending' : 'descending');
        } else {
          ind.textContent = 'unfold_more';
          ind.classList.remove('active');
          th.setAttribute('aria-sort', 'none');
        }
      });
    }

    function exportCSV() {
      if (!STATE.filteredRows.length) {
        alert('No hay datos para exportar.');
        return;
      }
      const sep = ';';
      const needsQuote = /[";\r\n]/;
      const escape = v => {
        const s = v === null || v === undefined ? '' : String(v);
        return needsQuote.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      };
      const lines = [
        STATE.headers.map(escape).join(sep),
        ...STATE.filteredRows.map(r =>
          STATE.headers.map((_, i) => escape(r[i])).join(sep)
        )
      ];
      // UTF-8 BOM so Excel detects encoding correctly
      const csv = '﻿' + lines.join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const today = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `${STATE.exportPrefix || 'datos'}-${today}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // EVENTOS
    // =======================
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(applyFiltersAndSort, 250);
    });

    STATE.filterConfig.forEach(col => {
      const s = document.getElementById(col.selectId);
      if (s) s.addEventListener('change', applyFiltersAndSort);
    });

    document.getElementById('clearFilters').addEventListener('click', clearAllFilters);
    document.getElementById('exportBtn').addEventListener('click', () => {

      // Close the drawer in mobile so the user sees the download feedback

    document.getElementById('pageSizeSelect').addEventListener('change', (e) => {

      if (n > 0) {

        STATE.currentPage = 1;
        renderTable();

    document.getElementById('prevPage').addEventListener('click', () => {
      if (STATE.currentPage > 1) {
        STATE.currentPage--;

    document.getElementById('nextPage').addEventListener('click', () => {
      const totalPages = Math.ceil(STATE.filteredRows.length / CONFIG.pageSize);
      if (STATE.currentPage < totalPages) {

    // Per-view KPI renderer dispatch. Falls back to the field-list layout

    const MODAL_KPI_RENDERERS = {
      maestro: (row, content) => renderModalKpiMaestro(row, content),

    function renderModalContent(row) {

      content.className = 'grid grid-cols-1 gap-x-4 gap-y-4 sm:grid-cols-2';

    // Default: every header → labeled card. Used by Maestro.
    function renderModalDefault(row, content) {
      STATE.headers.forEach((header, i) => {
        const sanitized = sanitizeCell(row[i]);

        const div = document.createElement('div');

    // KPI dashboard: groups metrics into Identificación / Características /
    // Productividad / Calidad / Producción de Azúcar. Used by ZQM.
    function renderModalKpiZqm(row, content) {
      // Use a single-column container; KPI sub-grids handle their own layout.
      content.className = 'kpi-modal';

      const headers = STATE.headers;
      // Build a normalized-header → first-index map; helper finds Nth match.
      const findIdx = (norm, occurrence) => {
        let count = 0;
        for (let i = 0; i < headers.length; i++) {
          if (normalizeHeader(headers[i]) === norm) {
            if (count === (occurrence || 0)) return i;
            count++;
          }
        }
        return -1;
      };
      const findIdxStarts = (prefix) =>
        headers.findIndex(h => normalizeHeader(h).startsWith(prefix));

      // Resolve cell value by matchers (returns sanitized text or '—')
      const getByIdx = (idx) => idx === -1 ? '—' : sanitizeCell(row[idx]).text;
      const getFirst = (...norms) => {
        for (const n of norms) {
          const i = findIdx(n);
          if (i !== -1) return getByIdx(i);
        }
        return '—';
      };

      // Identification
      const ano   = getFirst('AÑO', 'ANO', 'AÃO');
      const mes   = getFirst('MES');
      const ubic  = getByIdx(findIdxStarts('UBIC'));
      const sector = getFirst('SECTOR');
      const corte  = getFirst('CORTE');

      // Characteristics
      const area = getFirst('AREA');
      const edad = getFirst('EDAD');

      // Productivity
      const tcMes   = getFirst('TC-MES', 'TC MES');
      const tcTotal = getFirst('TC-TOTAL', 'TC TOTAL');
      const tch     = getFirst('TCH');
      const tchm    = getFirst('TCHM');

      // Quality
      const brix       = getFirst('BRIX');
      const sacarosa   = getFirst('SACAROSA');
      const pureza     = getFirst('PUREZA');
      const rendimient = getFirst('RENDIMIENT', 'RENDIMIENTO');

      // Sugar production: header has duplicate "TON.AZUCAR"; use occurrence-based lookup.
      const idxTonAz1 = findIdx('TON.AZUCAR', 0);
      const idxTonAz2 = findIdx('TON.AZUCAR', 1);
      const idxTahm   = findIdx('TON.AZUCAR (TAHM)', 0);
      const tonAz = getByIdx(idxTonAz1);
      const tah   = getByIdx(idxTonAz2);
      const tahm  = getByIdx(idxTahm);

      // Build markup
      content.innerHTML = `
        <div class="kpi-header">
          <div class="kpi-suerte">${escapeHtml(ubic)}</div>
          <div class="kpi-sector">${escapeHtml(sector)}</div>
          <div class="kpi-date">
            <span class="material-symbols-outlined">event</span>
            Mes ${escapeHtml(mes)} · ${escapeHtml(ano)}
            <span class="kpi-date-sep">·</span>
            <span class="material-symbols-outlined">content_cut</span>
            Corte ${escapeHtml(corte)}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Características</div>
          <div class="kpi-grid">
            ${kpiCard('square_foot', area, 'ha', 'Área')}
            ${kpiCard('calendar_month', edad, 'meses', 'Edad al corte')}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Productividad</div>
          <div class="kpi-grid">
            ${kpiCard('bar_chart', tch, 't/ha', 'TCH', true)}
            ${kpiCard('speed', tchm, 't/ha·mes', 'TCHM', true)}
            ${kpiCard('scale', tcTotal, 't', 'TC Total')}
            ${kpiCard('event_available', tcMes, 't', 'TC del mes')}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Calidad</div>
          <div class="kpi-grid">
            ${kpiCard('water_drop', brix, '%', 'Brix')}
            ${kpiCard('science', sacarosa, '%', 'Sacarosa')}
            ${kpiCard('verified', pureza, '%', 'Pureza')}
            ${kpiCard('trending_up', rendimient, '%', 'Rendimiento')}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Producción de azúcar</div>
          <div class="kpi-grid">
            ${kpiCard('inventory_2', tonAz, 't', 'Toneladas azúcar', true)}
            ${kpiCard('agriculture', tah, 't/ha', 'TAH (azúcar/ha)')}
            ${kpiCard('query_stats', tahm, 't/ha·mes', 'TAHM', true)}
          </div>
        </div>
      `;
    }

    // KPI dashboard for Maestro: identifies the suerte and shows status,
    // schedule, productivity estimates and responsibles.
    function renderModalKpiMaestro(row, content) {
      content.className = 'kpi-modal';

      const headers = STATE.headers;
      const findIdx = (norm) => headers.findIndex(h => normalizeHeader(h) === norm);
      const findIdxStarts = (prefix) => headers.findIndex(h => normalizeHeader(h).startsWith(prefix));
      const getByIdx = (idx) => idx === -1 ? '—' : sanitizeCell(row[idx]).text;
      const getFirst = (...norms) => {
        for (const n of norms) {
          const i = findIdx(n);
          if (i !== -1) return getByIdx(i);
        }
        return '—';
      };

      // Identification
      const suerte   = getFirst('SUERTE');
      const finca    = getFirst('FINCA');
      const zona     = getFirst('ZONA');
      const variedad = getFirst('VARIEDAD');

      // Características
      const area     = getFirst('AREA');
      const uso      = getFirst('USO DE LA SUERTE');
      const zonaAgro = getFirst('ZONA AGROECOLOGICA', 'ZONA AGROECOLÓGICA');

      // Estado del cultivo (calculated edad highlighted)
      const edadHoy  = STATE.edadColumnIndex !== -1
        ? sanitizeCell(row[STATE.edadColumnIndex]).text
        : '—';
      const corteN   = getFirst('NUMERO DE CORTE');

      // Cronograma
      const fSiembra = getFirst('FECHA DE SIEMBRA');
      const fUltCort = getFirst('FECHA DE ULTIMO CORTE', 'FECHA DE ÚLTIMO CORTE');
      const fProxCor = getFirst('FECHA DEL PROXIMO CORTE', 'FECHA DEL PRÓXIMO CORTE');

      // Productividad
      const tchPpto  = getFirst('TCH PPTO');
      const tchAnt   = getFirst('TCH ANTERIOR');
      const tchm     = getFirst('TCHM');
      const tonsPpto = getFirst('TONELADAS PPTO');
      const tonsEst  = getFirst('TONELADAS ESTIMADAS');

      // Responsables
      const respZona = getFirst('RESPONSABLE ZONA');
      const tecnico  = getFirst('TECNICO AGRICOLA RESPONSABLE', 'TÉCNICO AGRÍCOLA RESPONSABLE', 'TECNICO AGRÍCOLA RESPONSABLE');

      const variedadBadge = variedad && variedad !== '—'
        ? `<span class="kpi-badge">${escapeHtml(variedad)}</span>`
        : '';

      content.innerHTML = `
        <div class="kpi-header">
          <div class="kpi-suerte">${escapeHtml(suerte)}</div>
          <div class="kpi-sector">${escapeHtml(finca)} · Zona ${escapeHtml(zona)}</div>
          ${variedadBadge ? `<div class="kpi-date" style="margin-top:.55rem">
            <span class="material-symbols-outlined">grass</span>
            ${escapeHtml(variedad)}
          </div>` : ''}
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Características</div>
          <div class="kpi-grid">
            ${kpiCard('square_foot', area, 'ha', 'Área')}
            ${kpiCard('category', uso, '', 'Uso de la suerte')}
            ${kpiCard('terrain', zonaAgro, '', 'Zona agroecológica')}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Estado del cultivo</div>
          <div class="kpi-grid">
            ${kpiCard('schedule', edadHoy, 'meses', 'Edad hoy', true)}
            ${kpiCard('content_cut', corteN, '', 'Número de corte')}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Cronograma</div>
          <div class="kpi-grid">
            ${kpiCard('eco', fSiembra, '', 'Siembra')}
            ${kpiCard('history', fUltCort, '', 'Último corte')}
            ${kpiCard('event_upcoming', fProxCor, '', 'Próximo corte', true)}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Corte anterior</div>
          <div class="kpi-grid">
            ${kpiCard('history', tchAnt, 't/ha', 'TCH anterior')}
            ${kpiCard('speed', tchm, 't/ha·mes', 'TCHM')}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Ppto y estimados</div>
          <div class="kpi-grid">
            ${kpiCard('bar_chart', tchPpto, 't/ha', 'TCH PPTO', true)}
            ${kpiCard('scale', tonsPpto, 't', 'Toneladas PPTO')}
            ${kpiCard('query_stats', tonsEst, 't', 'Toneladas estimadas', true)}
          </div>
        </div>
        <div class="kpi-section">
          <div class="kpi-section-title">Responsables</div>
          <div class="kpi-grid">
            ${kpiCard('person', respZona, '', 'Responsable de zona')}
            ${kpiCard('engineering', tecnico, '', 'Técnico agrícola')}
          </div>
        </div>
      `;
    }

    function kpiCard(icon, value, unit, label, accent) {
      const isEmpty = value === '—' || value === '' || value == null;
      const accentClass = accent && !isEmpty ? ' accent' : '';
      const emptyClass = isEmpty ? ' empty' : '';
      return `<div class="kpi-card${accentClass}${emptyClass}">
        <span class="kpi-icon material-symbols-outlined">${escapeHtml(icon)}</span>
        <div class="kpi-value">${escapeHtml(value)}<span class="kpi-unit"> ${escapeHtml(unit)}</span></div>
        <div class="kpi-label">${escapeHtml(label)}</div>
      </div>`;
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function updateModalNavUI() {
      const idx = STATE.modalRowIndex;
      const total = STATE.filteredRows.length;
      document.getElementById('modalPrev').disabled = idx <= 0;
      document.getElementById('modalNext').disabled = idx >= total - 1;
      document.getElementById('modalIndex').textContent = total > 0
        ? `${idx + 1} / ${total}`
        : '';
    }

    function showRowDetails(idx) {
      if (idx < 0 || idx >= STATE.filteredRows.length) return;
      STATE.modalRowIndex = idx;
      renderModalContent(STATE.filteredRows[idx]);
      updateModalNavUI();
      document.getElementById('detailModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function navigateModal(delta) {
      const next = STATE.modalRowIndex + delta;
      if (next < 0 || next >= STATE.filteredRows.length) return;
      STATE.modalRowIndex = next;
      renderModalContent(STATE.filteredRows[next]);
      updateModalNavUI();
      // Reset scroll position inside the modal body on each navigation
      const body = document.querySelector('#detailModal .overflow-y-auto');
      if (body) body.scrollTop = 0;
    }

    function closeModal() {
      document.getElementById('detailModal').classList.add('hidden');
      document.body.style.overflow = '';
      STATE.modalRowIndex = -1;
    }

    // Unified global keyboard handler.
    // Priority: detail modal (open) > filter drawer (open) > search clear.
    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('detailModal');
      const modalOpen = modal && !modal.classList.contains('hidden');

      if (modalOpen) {
        if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); navigateModal(-1); return; }
        if (e.key === 'ArrowRight') { e.preventDefault(); navigateModal(+1); return; }
        return;
      }

      if (isFilterDrawerOpen()) {
        if (e.key === 'Escape') { e.preventDefault(); closeFilterDrawer(); return; }
        return;
      }

      if (e.key === 'Escape') {
        const input = document.getElementById('searchInput');
        if (input.value) {
          input.value = '';
          applyFiltersAndSort();
        }
        input.blur();
      }
    });

    // =======================
    // THEME MANAGEMENT
    // =======================
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      // Check saved or system preference
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light');
        updateThemeIcon('light');
      } else {
        document.documentElement.classList.remove('light');
        updateThemeIcon('dark');
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      html.classList.toggle('light');

      const isLight = html.classList.contains('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      updateThemeIcon(isLight ? 'light' : 'dark');
    }

    function updateThemeIcon(mode) {
      const icon = document.getElementById('themeIcon');
      if (mode === 'light') {
        icon.textContent = 'dark_mode'; // Icon to switch to dark
        icon.classList.replace('text-slate-400', 'text-slate-600');
      } else {
        icon.textContent = 'light_mode'; // Icon to switch to light
        icon.classList.replace('text-slate-600', 'text-slate-400');
      }
    }

    // Start
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      initApp();
    });

  </script>
</body>

</html>

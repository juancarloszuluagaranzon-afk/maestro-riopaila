<script>
  // =======================
  // CONFIGURACIÓN
  // =======================
  const CONFIG = {
    version: 'v1.8.6',
    csvFile: 'maestro.csv',
    pageSize: 25
  };

  let STATE = {
    headers: [],
    rows: [],
    filteredRows: [],
    currentPage: 1,
    newWorker: null,
    edadColumnIndex: -1,
    latIdx: -1,
    lonIdx: -1
  };

  // =======================
  // SERVICE WORKER
  // =======================
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
  }

  // =======================
  // INICIO
  // =======================
  document.addEventListener('DOMContentLoaded', initApp);

  async function initApp() {
    try {
      const response = await fetch(CONFIG.csvFile);
      if (!response.ok) throw new Error('No se pudo cargar el CSV');
      const text = await response.text();
      processData(text);
    } catch (e) {
      alert('Error cargando maestro.csv');
      console.error(e);
    }
  }

  // =======================
  // PROCESAR CSV
  // =======================
  function processData(csvText) {
    const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== '');
    const separator = lines[0].includes(';') ? ';' : ',';

    STATE.headers = lines[0].split(separator).map(h => h.trim());

    // Detectar columnas clave
    STATE.latIdx = STATE.headers.findIndex(h => h.toUpperCase().includes('LAT'));
    STATE.lonIdx = STATE.headers.findIndex(h =>
      h.toUpperCase().includes('LON') || h.toUpperCase().includes('LONG')
    );

    STATE.rows = [];
    for (let i = 1; i < lines.length; i++) {
      const row = lines[i].split(separator).map(c => c.trim());
      if (row.length > 1) STATE.rows.push(row);
    }

    STATE.filteredRows = [...STATE.rows];
    renderTable();
  }

  // =======================
  // RENDER TABLA
  // =======================
  function renderTable() {
    const tbody = document.querySelector('#maestro tbody');
    const thead = document.querySelector('#maestro thead');

    if (thead.rows.length === 0) {
      const tr = document.createElement('tr');
      STATE.headers.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        th.className = "px-6 py-4 text-xs text-teal-400 font-bold bg-slate-900/80";
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    }

    tbody.innerHTML = '';
    const start = (STATE.currentPage - 1) * CONFIG.pageSize;
    const pageData = STATE.filteredRows.slice(start, start + CONFIG.pageSize);

    pageData.forEach(row => {
      const tr = document.createElement('tr');
      tr.className = "cursor-pointer hover:bg-white/5";
      tr.onclick = () => showRowDetails(row);

      row.forEach(cell => {
        const td = document.createElement('td');
        td.textContent = cell;
        td.className = "px-6 py-4 text-slate-300";
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  }

  // =======================
  // MODAL DETALLE
  // =======================
  function showRowDetails(row) {
    const modal = document.getElementById('detailModal');
    const content = document.getElementById('modalContent');
    content.innerHTML = '';

    STATE.headers.forEach((h, i) => {
      const div = document.createElement('div');
      div.className = "p-3 bg-slate-800/40 rounded-lg";

      div.innerHTML = `
        <dt class="text-xs text-teal-400 font-bold">${h}</dt>
        <dd class="text-sm text-slate-200">${row[i] || '-'}</dd>
      `;
      content.appendChild(div);
    });

    // ----- BOTÓN MAPA -----
    if (STATE.latIdx !== -1 && STATE.lonIdx !== -1) {
      const lat = row[STATE.latIdx];
      const lon = row[STATE.lonIdx];

      if (lat && lon) {
        const mapDiv = document.createElement('div');
        mapDiv.className = "sm:col-span-2 mt-4";

        mapDiv.innerHTML = `
          <button
            onclick="abrirMapa('${lat}','${lon}')"
            class="w-full flex items-center justify-center gap-2 rounded-xl bg-teal-600 hover:bg-teal-500 text-white px-4 py-3 font-bold transition-all">
            📍 Ver ubicación en el mapa
          </button>
        `;
        content.appendChild(mapDiv);
      }
    }

    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('detailModal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  // =======================
  // MAPA
  // =======================
  function abrirMapa(lat, lon) {
    const url = `https://www.google.com/maps?q=${lat},${lon}`;
    window.open(url, '_blank');
  }
</script>
